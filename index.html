<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BS Options">
<meta name="theme-color" content="#060e18">
<title>Black-Scholes · Opciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #060e18;
    --bg1: #0b1625;
    --bg2: #0f1e30;
    --bg3: #152438;
    --line: #1a3050;
    --line2: #0e1e30;
    --blue: #3a9eff;
    --blue-dim: #1a4a80;
    --green: #00e676;
    --green-dim: #00552a;
    --green-bg: #021a0e;
    --red: #ff4d6a;
    --red-dim: #6a1020;
    --red-bg: #1a0208;
    --gold: #ffd54f;
    --gold-bg: #1a1200;
    --text: #d0dce8;
    --text-dim: #5a7a98;
    --text-faint: #2a4a68;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Barlow Condensed', sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: var(--bg0); height: 100%; }

  body {
    font-family: var(--mono);
    background: var(--bg0);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(20px + var(--safe-bottom));
    overflow-x: hidden;
  }

  /* Subtle grid texture */
  body::before {
    content:'';
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(var(--line2) 1px, transparent 1px),
      linear-gradient(90deg, var(--line2) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
  }

  /* ── HEADER ────────────────────────────── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(6,14,24,0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: calc(var(--safe-top) + 12px) 16px 0;
  }

  .header-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 12px;
  }

  .brand { line-height: 1; }
  .brand-name {
    font-family: var(--sans); font-size: 18px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--blue);
  }
  .brand-sub {
    font-family: var(--sans); font-size: 11px; font-weight: 400;
    color: var(--text-dim); letter-spacing: 0.08em; margin-top: 2px;
  }

  .t-badge {
    text-align: right;
    font-family: var(--sans);
  }
  .t-badge .label { font-size: 10px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; }
  .t-badge .value { font-size: 14px; font-weight: 600; color: var(--text-dim); margin-top: 1px; }

  /* Price cards */
  .price-cards {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 12px;
  }
  .price-card {
    border-radius: 12px;
    padding: 10px 14px;
    position: relative; overflow: hidden;
    transition: transform 0.15s;
  }
  .price-card::after {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
  }
  .price-card.call {
    background: var(--green-bg);
    border: 1px solid #00552a;
  }
  .price-card.call::after { background: linear-gradient(90deg, transparent, var(--green), transparent); }
  .price-card.put {
    background: var(--red-bg);
    border: 1px solid #551020;
  }
  .price-card.put::after { background: linear-gradient(90deg, transparent, var(--red), transparent); }

  .card-label {
    font-family: var(--sans); font-size: 11px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 4px;
  }
  .call .card-label { color: #00a855; }
  .put  .card-label { color: #cc3355; }

  .card-price {
    font-size: 26px; font-weight: 700; line-height: 1;
    transition: all 0.2s ease;
  }
  .call .card-price { color: var(--green); }
  .put  .card-price { color: var(--red); }

  .card-delta {
    font-size: 11px; margin-top: 4px;
  }
  .call .card-delta { color: #00774a; }
  .put  .card-delta { color: #882030; }

  /* Moneyness pill */
  .card-itm {
    position: absolute; top: 8px; right: 10px;
    font-family: var(--sans); font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; padding: 2px 7px; border-radius: 20px;
  }
  .itm-call  { background: #003a1a; color: var(--green); border: 1px solid #005a28; }
  .itm-put   { background: #3a0010; color: var(--red);   border: 1px solid #6a0020; }
  .atm-badge { background: #3a2e00; color: var(--gold);  border: 1px solid #5a4800; }

  /* Tabs */
  .tabs {
    display: flex; border-top: 1px solid var(--line);
    margin: 0 -16px;
  }
  .tab-btn {
    flex: 1; background: none; border: none; cursor: pointer;
    font-family: var(--sans); font-size: 12px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 10px 0; color: var(--text-faint);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
  }
  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-btn + .tab-btn { border-left: 1px solid var(--line); }

  /* ── INPUTS ────────────────────────────── */
  .inputs-wrap {
    padding: 14px 16px 10px;
    position: relative; z-index: 1;
    border-bottom: 1px solid var(--line);
  }
  .inputs-grid {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 8px;
  }
  .input-group {}
  .input-label {
    font-family: var(--sans); font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-dim); display: block; margin-bottom: 5px;
    text-align: center;
  }
  .input-field {
    width: 100%; background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 8px;
    color: var(--text); font-family: var(--mono); font-size: 15px;
    font-weight: 600; text-align: center;
    outline: none; -webkit-appearance: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .input-field:focus {
    border-color: var(--blue);
    background: #0d2040;
    box-shadow: 0 0 0 3px rgba(58,158,255,0.12);
  }
  .input-field::-webkit-inner-spin-button,
  .input-field::-webkit-outer-spin-button { -webkit-appearance: none; }

  .t-hint {
    text-align: center; font-size: 10px;
    color: var(--text-faint); margin-top: 8px;
    font-family: var(--sans); letter-spacing: 0.05em;
  }

  /* ── CONTENT PANELS ───────────────────── */
  .panel { padding: 14px 12px 32px; position: relative; z-index: 1; }
  .panel.hidden { display: none; }

  /* ── TABLE ─────────────────────────────── */
  .variation-table {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 14px; overflow: hidden;
  }
  .tbl-head {
    display: grid; grid-template-columns: 54px 1fr 1fr 1fr;
    background: var(--bg2);
    border-bottom: 1px solid var(--line);
  }
  .tbl-head-cell {
    font-family: var(--sans); font-size: 11px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 10px 8px;
    border-right: 1px solid var(--line);
  }
  .tbl-head-cell:first-child { text-align: center; color: var(--text-dim); }
  .tbl-head-cell:last-child  { border-right: none; }
  .tbl-head-cell.th-call { color: var(--green); text-align: right; }
  .tbl-head-cell.th-put  { color: var(--red);   text-align: right; }
  .tbl-head-cell.th-price{ color: var(--blue);  text-align: right; }

  .tbl-row {
    display: grid; grid-template-columns: 54px 1fr 1fr 1fr;
    border-bottom: 1px solid var(--line2);
    transition: background 0.15s;
  }
  .tbl-row:last-child { border-bottom: none; }
  .tbl-row.row-neg { background: rgba(14,8,8,0.7); }
  .tbl-row.row-pos { background: rgba(5,12,8,0.7); }
  .tbl-row.row-base {
    background: rgba(18,14,0,0.85);
    box-shadow: inset 0 0 0 1px rgba(255,213,79,0.15);
  }

  .tbl-cell {
    padding: 9px 8px;
    border-right: 1px solid var(--line2);
    display: flex; align-items: center;
  }
  .tbl-cell:last-child { border-right: none; }

  /* % column */
  .cell-pct { justify-content: center; }
  .pct-pill {
    font-family: var(--sans); font-size: 12px; font-weight: 700;
    padding: 3px 7px; border-radius: 6px; text-align: center;
    width: 100%; letter-spacing: 0.05em;
  }
  .pct-dot {
    width: 5px; height: 5px; border-radius: 50%; margin: 0 auto; opacity: 0.25;
  }

  /* Numeric cells */
  .cell-num { justify-content: flex-end; }
  .num-val {
    font-size: 13px; font-weight: 600; font-family: var(--mono);
    text-align: right;
  }
  .num-val.price-val { color: var(--text-dim); }
  .num-val.call-val  { color: #00c060; }
  .num-val.put-val   { color: #dd3355; }
  .num-val.base-price{ color: var(--gold); font-weight: 700; }
  .num-val.base-call { color: var(--green); font-weight: 700; }
  .num-val.base-put  { color: var(--red);   font-weight: 700; }

  .tbl-note {
    text-align: center; font-size: 10px; color: var(--text-faint);
    font-family: var(--sans); letter-spacing: 0.06em; margin-top: 8px;
  }

  /* ── GREEKS ─────────────────────────────── */
  .greeks-cards {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 14px;
  }
  .greek-summary {
    border-radius: 12px; padding: 12px 14px;
    border: 1px solid var(--line); background: var(--bg2);
    text-align: center;
  }
  .greek-summary .gs-label {
    font-family: var(--sans); font-size: 11px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 6px;
  }
  .greek-summary .gs-price {
    font-size: 22px; font-weight: 700; line-height: 1;
  }
  .greek-summary .gs-badge {
    font-family: var(--sans); font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; display: inline-block;
    padding: 2px 8px; border-radius: 20px; margin-top: 6px;
  }
  .gc { border-color: #00552a; background: var(--green-bg); }
  .gc .gs-label { color: #00a855; }
  .gc .gs-price { color: var(--green); }
  .gp { border-color: #551020; background: var(--red-bg); }
  .gp .gs-label { color: #cc3355; }
  .gp .gs-price { color: var(--red); }

  .greek-list {
    background: var(--bg1); border: 1px solid var(--line);
    border-radius: 14px; overflow: hidden;
  }
  .greek-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line2);
  }
  .greek-row:last-child { border-bottom: none; }
  .greek-key {
    font-family: var(--sans); font-size: 13px; font-weight: 600;
    color: var(--text-dim); letter-spacing: 0.05em;
  }
  .greek-key span { color: var(--text-faint); font-size: 11px; margin-left: 4px; }
  .greek-val {
    font-size: 15px; font-weight: 700;
  }

  /* Animations */
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .panel { animation: fadeSlide 0.2s ease; }

  @keyframes pulse-green {
    0%   { box-shadow: 0 0 0 0 rgba(0,230,118,0.3); }
    70%  { box-shadow: 0 0 0 6px rgba(0,230,118,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,230,118,0); }
  }
  @keyframes pulse-red {
    0%   { box-shadow: 0 0 0 0 rgba(255,77,106,0.3); }
    70%  { box-shadow: 0 0 0 6px rgba(255,77,106,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,77,106,0); }
  }
  .price-card.call.updated { animation: pulse-green 0.4s ease; }
  .price-card.put.updated  { animation: pulse-red 0.4s ease; }

  .no-data {
    text-align: center; padding: 40px 16px;
    font-family: var(--sans); font-size: 14px;
    color: var(--text-faint); letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════ HEADER ═══ -->
<div class="header" id="header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-name">Black-Scholes</div>
      <div class="brand-sub">Opciones Europeas · BSM</div>
    </div>
    <div class="t-badge" id="tBadge" style="display:none">
      <div class="label">Vencimiento</div>
      <div class="value" id="tValue">—</div>
    </div>
  </div>

  <div class="price-cards">
    <div class="price-card call" id="callCard">
      <div class="card-label">Call</div>
      <div class="card-price" id="callPrice">—</div>
      <div class="card-delta" id="callDelta">Δ —</div>
      <div class="card-itm" id="callItm"></div>
    </div>
    <div class="price-card put" id="putCard">
      <div class="card-label">Put</div>
      <div class="card-price" id="putPrice">—</div>
      <div class="card-delta" id="putDelta">Δ —</div>
      <div class="card-itm" id="putItm"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabTable" onclick="switchTab('table')">Tabla Variación</button>
    <button class="tab-btn" id="tabGreeks" onclick="switchTab('greeks')">Griegos</button>
  </div>
</div>

<!-- ═══════════════════════════════════════ INPUTS ═══ -->
<div class="inputs-wrap">
  <div class="inputs-grid">
    <div class="input-group">
      <label class="input-label" for="iS">Spot S</label>
      <input class="input-field" id="iS" type="number" value="70900" inputmode="decimal" step="any" oninput="calc()">
    </div>
    <div class="input-group">
      <label class="input-label" for="iK">Strike K</label>
      <input class="input-field" id="iK" type="number" value="70900" inputmode="decimal" step="any" oninput="calc()">
    </div>
    <div class="input-group">
      <label class="input-label" for="iDias">Días T</label>
      <input class="input-field" id="iDias" type="number" value="90" inputmode="numeric" step="1" oninput="calc()">
    </div>
    <div class="input-group">
      <label class="input-label" for="iSigma">Vol σ %</label>
      <input class="input-field" id="iSigma" type="number" value="25" inputmode="decimal" step="any" oninput="calc()">
    </div>
    <div class="input-group">
      <label class="input-label" for="iR">Tasa r %</label>
      <input class="input-field" id="iR" type="number" value="5" inputmode="decimal" step="any" oninput="calc()">
    </div>
    <div class="input-group">
      <label class="input-label" for="iQ">Div. q %</label>
      <input class="input-field" id="iQ" type="number" value="0" inputmode="decimal" step="any" oninput="calc()">
    </div>
  </div>
  <div class="t-hint" id="tHint"></div>
</div>

<!-- ═══════════════════════════════════════ TABLE PANEL ═══ -->
<div class="panel" id="panelTable">
  <div class="variation-table" id="varTable">
    <div class="no-data">Ingresá los parámetros para calcular</div>
  </div>
  <div class="tbl-note">pasos de 2% · etiquetas cada 4% · fila base en amarillo</div>
</div>

<!-- ═══════════════════════════════════════ GREEKS PANEL ═══ -->
<div class="panel hidden" id="panelGreeks">
  <div class="greeks-cards" id="greekCards"></div>
  <div class="greek-list" id="greekList"></div>
</div>

<script>
/* ── Math helpers ─────────────────────────────────────── */
function erf(x){
  const a=[0.254829592,-0.284496736,1.421413741,-1.453152027,1.061405429],p=0.3275911;
  const s=x<0?-1:1; x=Math.abs(x);
  const t=1/(1+p*x);
  const y=1-((((a[4]*t+a[3])*t+a[2])*t+a[1])*t+a[0])*t*Math.exp(-x*x);
  return s*y;
}
const N=x=>(1+erf(x/Math.SQRT2))/2;
const n=x=>Math.exp(-0.5*x*x)/Math.sqrt(2*Math.PI);

function bsCalc(S,K,r,q,sig,T,type){
  if(T<=0||sig<=0||S<=0||K<=0) return null;
  const sq=Math.sqrt(T);
  const d1=(Math.log(S/K)+(r-q+0.5*sig*sig)*T)/(sig*sq);
  const d2=d1-sig*sq;
  const eqT=Math.exp(-q*T), erT=Math.exp(-r*T);
  let price,delta;
  if(type==='call'){price=S*eqT*N(d1)-K*erT*N(d2);delta=eqT*N(d1);}
  else{price=K*erT*N(-d2)-S*eqT*N(-d1);delta=eqT*(N(d1)-1);}
  const gamma=eqT*n(d1)/(S*sig*sq);
  const vega=S*eqT*n(d1)*sq/100;
  const theta=(-S*eqT*n(d1)*sig/(2*sq)-r*K*erT*(type==='call'?N(d2):N(-d2))+q*S*eqT*(type==='call'?N(d1):N(-d1)))/365;
  const rho=(type==='call'?K*T*erT*N(d2):-K*T*erT*N(-d2))/100;
  return{price,delta,gamma,vega,theta,rho,d1,d2};
}

/* ── Formatting ───────────────────────────────────────── */
const fmt=(v,d=2)=>v==null||isNaN(v)?'—':v.toLocaleString('es-AR',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtSgn=(v,d=4)=>{if(v==null||isNaN(v)) return'—'; return(v>=0?'+':'')+v.toFixed(d);}

/* ── Steps ─────────────────────────────────────────────── */
const STEPS=Array.from({length:25},(_,i)=>-24+i*2);

/* ── Colour helpers ────────────────────────────────────── */
function pctStyle(step){
  if(step===0) return{bg:'#2a1e00',border:'#7a5800',color:'#ffd54f'};
  if(step<0){
    const k=Math.abs(step)/24;
    return{bg:`rgba(${Math.round(40+k*80)},8,8,0.7)`,border:'#5a1018',color:'#ff8899'};
  }
  const k=step/24;
  return{bg:`rgba(8,${Math.round(40+k*80)},18,0.7)`,border:'#1a5228',color:'#66ee99'};
}

/* ── Main calc ─────────────────────────────────────────── */
let activeTab='table';

function calc(){
  const S=parseFloat(document.getElementById('iS').value);
  const K=parseFloat(document.getElementById('iK').value);
  const dias=parseFloat(document.getElementById('iDias').value);
  const sig=parseFloat(document.getElementById('iSigma').value)/100;
  const r=parseFloat(document.getElementById('iR').value)/100;
  const q=parseFloat(document.getElementById('iQ').value)/100;
  const T=dias/365;

  const valid=![S,K,dias,sig,r,q].some(isNaN)&&S>0&&K>0&&dias>0&&sig>0;

  // t-badge
  document.getElementById('tBadge').style.display=valid?'block':'none';
  if(valid){
    document.getElementById('tValue').textContent=dias+' días';
    document.getElementById('tHint').textContent='T = '+(T).toFixed(4)+' años';
  } else {
    document.getElementById('tHint').textContent='';
  }

  if(!valid){
    document.getElementById('callPrice').textContent='—';
    document.getElementById('putPrice').textContent='—';
    document.getElementById('callDelta').textContent='Δ —';
    document.getElementById('putDelta').textContent='Δ —';
    document.getElementById('callItm').textContent='';
    document.getElementById('putItm').textContent='';
    document.getElementById('varTable').innerHTML='<div class="no-data">Ingresá los parámetros para calcular</div>';
    document.getElementById('greekCards').innerHTML='';
    document.getElementById('greekList').innerHTML='';
    return;
  }

  const call=bsCalc(S,K,r,q,sig,T,'call');
  const put =bsCalc(S,K,r,q,sig,T,'put');

  /* ── Header prices ── */
  animateCard('callCard','call');
  animateCard('putCard','put');
  document.getElementById('callPrice').textContent=fmt(call?.price,2);
  document.getElementById('putPrice').textContent=fmt(put?.price,2);
  document.getElementById('callDelta').textContent='Δ '+(call?.delta?.toFixed(3)??'—');
  document.getElementById('putDelta').textContent='Δ '+(put?.delta?.toFixed(3)??'—');

  const atm=Math.abs(S-K)/K<0.005;
  const cItm=!atm&&S>K, pItm=!atm&&S<K;
  setItmBadge('callItm', atm?'ATM':cItm?'ITM':'OTM', atm?'atm-badge':cItm?'itm-call':'itm-put');
  setItmBadge('putItm',  atm?'ATM':pItm?'ITM':'OTM', atm?'atm-badge':pItm?'itm-put':'itm-call');

  /* ── Table ── */
  buildTable(S,K,r,q,sig,T);

  /* ── Greeks ── */
  buildGreeks(S,K,call,put);
}

function setItmBadge(id,text,cls){
  const el=document.getElementById(id);
  el.textContent=text;
  el.className='card-itm '+cls;
}

let animTimer={};
function animateCard(id,type){
  const el=document.getElementById(id);
  el.classList.remove('updated');
  clearTimeout(animTimer[id]);
  void el.offsetWidth;
  el.classList.add('updated');
  animTimer[id]=setTimeout(()=>el.classList.remove('updated'),500);
}

function buildTable(S,K,r,q,sig,T){
  let html='<div class="tbl-head">'
    +'<div class="tbl-head-cell">%</div>'
    +'<div class="tbl-head-cell th-price">Precio</div>'
    +'<div class="tbl-head-cell th-call">CALL</div>'
    +'<div class="tbl-head-cell th-put">PUT</div>'
    +'</div>';

  STEPS.forEach(step=>{
    const spot=S*(1+step/100);
    const c=bsCalc(spot,K,r,q,sig,T,'call');
    const p=bsCalc(spot,K,r,q,sig,T,'put');
    const isBase=step===0;
    const showLabel=step%4===0;
    const rowClass=isBase?'row-base':step<0?'row-neg':'row-pos';
    const {bg,border,color}=pctStyle(step);

    /* % cell */
    let pctCell='';
    if(showLabel){
      const label=step===0?'0%':step>0?`+${step}%`:`${step}%`;
      pctCell=`<div class="pct-pill" style="background:${bg};border:1px solid ${border};color:${color}">${label}</div>`;
    } else {
      pctCell=`<div class="pct-dot" style="background:${color}"></div>`;
    }

    const priceClass=isBase?'base-price':'price-val';
    const callClass =isBase?'base-call':'call-val';
    const putClass  =isBase?'base-put':'put-val';

    html+=`<div class="tbl-row ${rowClass}">
      <div class="tbl-cell cell-pct">${pctCell}</div>
      <div class="tbl-cell cell-num"><span class="num-val ${priceClass}">${fmt(spot,2)}</span></div>
      <div class="tbl-cell cell-num"><span class="num-val ${callClass}">${fmt(c?.price,2)}</span></div>
      <div class="tbl-cell cell-num"><span class="num-val ${putClass}">${fmt(p?.price,2)}</span></div>
    </div>`;
  });

  document.getElementById('varTable').innerHTML=html;
}

function buildGreeks(S,K,call,put){
  const atm=Math.abs(S-K)/K<0.005;
  const cItm=!atm&&S>K, pItm=!atm&&S<K;

  const badge=(itm,atm)=>atm
    ?`<div class="gs-badge atm-badge">ATM</div>`
    :itm?`<div class="gs-badge itm-call">ITM</div>`
        :`<div class="gs-badge itm-put">OTM</div>`;

  document.getElementById('greekCards').innerHTML=`
    <div class="greek-summary gc">
      <div class="gs-label">Call</div>
      <div class="gs-price">${fmt(call?.price,4)}</div>
      ${badge(cItm,atm)}
    </div>
    <div class="greek-summary gp">
      <div class="gs-label">Put</div>
      <div class="gs-price">${fmt(put?.price,4)}</div>
      ${badge(pItm,atm)}
    </div>`;

  const rows=[
    {k:'Δ Delta',    sub:'call',  v:call?.delta?.toFixed(4),  c:'#3a9eff'},
    {k:'Δ Delta',    sub:'put',   v:put?.delta?.toFixed(4),   c:'#3a9eff'},
    {k:'Γ Gamma',    sub:'',      v:call?.gamma?.toFixed(6),  c:'#ffd54f'},
    {k:'ν Vega',     sub:'/ 1%σ', v:call?.vega?.toFixed(4),  c:'#ff9f4a'},
    {k:'Θ Theta',    sub:'/ día', v:call?.theta?.toFixed(4),  c:'#c084fc'},
    {k:'ρ Rho',      sub:'/ 1%r', v:call?.rho?.toFixed(4),   c:'#67e8f9'},
    {k:'d₁',         sub:'',      v:call?.d1?.toFixed(4),    c:'#5a7a98'},
    {k:'d₂',         sub:'',      v:call?.d2?.toFixed(4),    c:'#5a7a98'},
  ];

  document.getElementById('greekList').innerHTML=rows.map(({k,sub,v,c})=>`
    <div class="greek-row">
      <div class="greek-key">${k}${sub?`<span>${sub}</span>`:''}</div>
      <div class="greek-val" style="color:${c}">${v??'—'}</div>
    </div>`).join('');
}

/* ── Tabs ─────────────────────────────────────────────── */
function switchTab(tab){
  activeTab=tab;
  document.getElementById('panelTable').classList.toggle('hidden',tab!=='table');
  document.getElementById('panelGreeks').classList.toggle('hidden',tab!=='greeks');
  document.getElementById('tabTable').classList.toggle('active',tab==='table');
  document.getElementById('tabGreeks').classList.toggle('active',tab==='greeks');
}
